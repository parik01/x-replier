<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link rel="stylesheet" href="popup.css"><title>X-replier</title></head>
<body><main><h1>X-replier <small>0.2.0</small></h1><p class="hint">Работает только с открытой лентой X. Ключ остаётся в background worker.</p>
<label>OpenAI API key<input id="apiKey" type="password" autocomplete="off" placeholder="sk-…"></label>
<div class="actions"><button id="test">Проверить OpenAI</button><button id="deleteKey">Удалить ключ</button></div>
<label>Модель<input id="model" value="gpt-4.1-mini"></label>
<label>Стиль / системный промпт<textarea id="systemPrompt" rows="5"></textarea></label>
<div class="grid"><label>Лимит в день<input id="dailyLimit" type="number" min="1" max="100"></label><label>Мин. длина поста<input id="minPostLength" type="number" min="1"></label><label>Пауза от, сек<input id="minDelaySec" type="number" min="1"></label><label>Пауза до, сек<input id="maxDelaySec" type="number" min="1"></label></div>
<label class="mode"><input id="autoMode" type="checkbox"> Автоотправка после задержки</label><label id="autoConfirmRow" class="mode hidden"><input id="autoConfirmed" type="checkbox"> Я понимаю, что автоотправка может публиковать ответы от моего имени</label>
<p class="warning">Draft вставляет черновик и ждёт вашего действия. Auto выключен по умолчанию и требует подтверждения.</p>
<p id="job" class="job"></p><div class="actions"><button id="save">Сохранить</button><button id="start" class="primary">Запустить</button><button id="stop">Стоп</button></div><div class="actions"><button id="clearHistory">Сбросить историю</button></div><p id="status" role="status"></p>
</main><script src="core.js"></script><script src="popup.js"></script></body></html>
